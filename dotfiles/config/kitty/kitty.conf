# Import the Borderlands Colorway
include ./borderlands.conf

# ---- TYPOGRAPHY (Snappy HUD Layout) ----
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.5

# ---- WINDOW DECORATIONS & CELL PADDING ----
# Clean layouts without standard native window borders
window_padding_width 12
confirm_os_window_close 0

# Visual Bell Flash matching the Shield Breakdown animation
enable_audio_bell no
visual_bell_duration 0.1
visual_bell_color #ff3366

# Automatically start terminal sessions running fast fetch routines
shell fish

