# =============================================================================
# HYPRLAND MAIN CONFIGURATION FILE
# Wallpaper & Theme Source: Borderlands 4 Cosmic 5K
# =============================================================================

# ---- MONITOR CONFIGURATION ----
monitor=,preferred,auto,1

# ---- AUTOSTART ----
exec-once = hyprflow --daemon
#exec-once = waybar
exec-once = /home/ste/Projects/wlstatus/wlstatus
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Automatically restore your last saved application session configuration layout
exec-once = hyprsession load default
# Run your reliable application layout assignment sequence
exec-once = /home/ste/.config/hypr/scripts/restore-session.sh
# Start the background daemon first
exec-once = awww-daemon

# Wait for the daemon to initialize, then set the image and generate colors
exec-once = sleep 0.5 && awww img '/home/ste/Downloads/borderlands-4-5120x2880-22442.jpg' && matugen image '/home/ste/Downloads/borderlands-4-5120x2880-22442.jpg'

# ---- INPUTS ----
input {
    kb_layout = gb
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# ---- LOOK & FEEL ----
# Dynamic theme palette source mapped from Matugen extraction engine
source = ~/.config/hypr/colors.conf

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    # Border colors dynamically fed from the wallpaper color palette
    col.active_border = $primary $accent 45deg
    col.inactive_border = $background
    
    # Correctly nested layout selector
    layout = dwindle
}

decoration {
    rounding = 8
    
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

dwindle {
    preserve_split = true 
}

# ---- KEYBINDINGS ----
$mainMod = SUPER

# Application Launches & Window Control
bind = $mainMod, Q, exec, /home/ste/.config/waybar/scripts/keybinds.sh
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, /home/ste/.config/hypr/scripts/logout-confirm.sh
bind = $mainMod, F, exec, pcmanfm
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, /home/ste/hyprland-launcher/borderlands4-launcher.sh
bind = $mainMod, B, exec, google-chrome-stable
# Change your existing line to this clean GUI script execute call:
bind = $mainMod SHIFT, U, exec, /home/ste/.config/hypr/scripts/update-assessor.sh
# The env prefix isolates the Sway variable strictly to the flameshot process
bind = , Print, exec, env XDG_CURRENT_DESKTOP=Sway flameshot gui
# Completely native alternative (No env hacks, guaranteed no status bar crashes)
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy


# Focus Movements
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4

# Move Active Window to Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4

# ---- ANIMATIONS (BORDERLANDS HUD SNAPPY STYLE) ----
animations {
    enabled = true

    # Custom Bezier Curves 
    bezier = bounce, 0.15, 1.15, 0.4, 1.0
    bezier = rapid, 0.1, 1.0, 0.1, 1.0

    # Window Spawn / Closure Effects
    animation = windows, 1, 2, bounce, popin 85%
    animation = windowsOut, 1, 1.5, rapid, popin 90%
    animation = windowsMove, 1, 2, bounce

    # Workspace Transition Effects (Fast Slide)
    animation = workspaces, 1, 2.5, bounce, slide
    animation = specialWorkspace, 1, 2.5, bounce, slidevert

    # Border & Fade Effects
    animation = border, 1, 1, rapid
    animation = borderangle, 1, 30, rapid, loop
    animation = fade, 1, 2, rapid
}

